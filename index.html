<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المشرف - نظام كركوك الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #090d16;
            --bg-surface: #111827;
            --bg-surface-elevated: #1f2937;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.15);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.05);
            --radius-lg: 16px;
            --radius-md: 12px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        /* شاشة تسجيل الدخول */
        .login-box { background: var(--bg-surface); padding: 40px 30px; border-radius: var(--radius-lg); text-align: center; border: 1px solid var(--border-color); max-width: 420px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .login-box h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
        .admin-btn-login { background: var(--primary); color: white; padding: 14px; border: none; border-radius: var(--radius-md); font-weight: 600; font-size: 16px; width: 100%; margin-top: 10px; cursor: pointer; transition: var(--transition); }
        .admin-btn-login:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }

        /* اللوحة الرئيسية */
        .admin-panel { display: none; width: 100%; max-width: 800px; background: var(--bg-surface); border-radius: var(--radius-lg); padding: 32px; border: 1px solid var(--border-color); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
        .panel-header h3 { font-size: 20px; font-weight: 700; color: var(--text-main); }
        
        /* نظام التبويب الحديث */
        .admin-tabs-nav { display: flex; background: rgba(0, 0, 0, 0.2); padding: 4px; border-radius: var(--radius-md); margin-bottom: 28px; gap: 4px; border: 1px solid var(--border-color); }
        .admin-tab-btn { flex: 1; padding: 10px 14px; background: transparent; border: none; color: var(--text-muted); font-weight: 600; font-size: 14px; cursor: pointer; border-radius: 8px; transition: var(--transition); }
        .admin-tab-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.02); }
        .admin-tab-btn.active { background: var(--bg-surface-elevated); color: var(--text-main); border: 1px solid var(--border-color); }

        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* الحقول والاستمارات */
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }
        @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
        .admin-input-group { text-align: right; display: flex; flex-direction: column; gap: 6px; }
        .admin-input-group.full-width { grid-column: 1 / -1; }
        .admin-input-group label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .admin-input-group input, .admin-input-group select { width: 100%; padding: 12px 14px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: white; outline: none; transition: var(--transition); font-size: 14px; text-align: right; }
        .admin-input-group input:focus, .admin-input-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
        
        .admin-btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: var(--radius-md); font-weight: 600; font-size: 15px; cursor: pointer; transition: var(--transition); margin-top: 10px; }
        .admin-btn-add:hover { background: #2563eb; }

        /* القوائم والعناصر */
        .list-container { display: flex; flex-direction: column; gap: 12px; }
        .admin-list-item { background: rgba(255, 255, 255, 0.01); border: 1px solid var(--border-color); padding: 16px 20px; border-radius: var(--radius-md); text-align: right; transition: var(--transition); }
        .admin-list-item:hover { background: rgba(255, 255, 255, 0.02); border-color: rgba(255,255,255,0.1); }
        .item-meta-row { display: flex; justify-content: space-between; align-items: center; }
        .item-title { font-weight: 600; font-size: 15px; color: var(--text-main); }
        
        /* أزرار التحكم الفاخرة */
        .admin-actions-row-buttons { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
        .action-control-btn { padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--transition); }
        
        /* تعديل الألوان حسب طلبك */
        .btn-control-ban { background: var(--danger); color: white; }
        .btn-control-ban:hover { background: #dc2626; }
        .btn-control-unban { background: var(--success); color: white; }
        .btn-control-unban:hover { background: #059669; }
        .btn-control-delete { background: var(--warning); color: #050511; }
        .btn-control-delete:hover { background: #d97706; }
        
        /* بطاقات الإحصائيات */
        .admin-analytics-banner { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .analytics-card { background: rgba(0, 0, 0, 0.15); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 4px; text-align: center; }
        .analytics-card span:first-child { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .analytics-card span:last-child { font-size: 22px; font-weight: 700; }

        .btn-reset-scores { width: 100%; background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 12px; border-radius: var(--radius-md); font-weight: 600; font-size: 14px; cursor: pointer; margin-bottom: 24px; transition: var(--transition); }
        .btn-reset-scores:hover { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.05); }
    </style>
</head>
<body>

    <!-- واجهة تسجيل دخول الأدمن -->
    <div class="login-box" id="adminLoginPage">
        <h2>لوحة حساب الإدارة 🔒</h2>
        <p style="font-size:13px; color:var(--text-muted); margin-top:4px; margin-bottom: 24px;">يرجى إدخال مفاتيح العبور الآمنة للنظام</p>
        
        <div class="admin-input-group" style="margin-bottom: 14px;">
            <label>اسم المشرف</label>
            <input type="text" id="adminUser" placeholder="اسم الحساب">
        </div>
        <div class="admin-input-group" style="margin-bottom: 20px;">
            <label>كلمة السر الإدارية</label>
            <input type="password" id="adminPass" placeholder="••••••••">
        </div>
        
        <button class="admin-btn-login" onclick="loginAdminCustom()">تسجيل الدخول</button>
    </div>

    <!-- لوحة التحكم الإدارية الكاملة -->
    <div class="admin-panel" id="adminPanelPage">
        <header class="panel-header">
            <h3>منصة كركوك المركزية لإدارة النظام</h3>
            <span style="font-size: 12px; color: var(--success); background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 20px; font-weight: 600;">متصل بالسيرفر 🟢</span>
        </header>
        
        <div class="admin-tabs-nav">
            <button class="admin-tab-btn active" onclick="switchTab('addTab', this)">إضافة سؤال</button>
            <button class="admin-tab-btn" onclick="switchTab('questionsTab', this); loadQuestions();">الأسئلة الحالية</button>
            <button class="admin-tab-btn" onclick="switchTab('playersTab', this); loadPlayers();">اللاعبين والإحصائيات</button>
        </div>

        <!-- طاب الإضافة -->
        <div class="admin-tab-content active" id="addTab">
            <input type="hidden" id="editQuestionId" value="">
            <div class="form-grid">
                <div class="admin-input-group full-width"><label>نص السؤال</label><input type="text" id="adminQuestionInput" placeholder="اكتب نص السؤال هنا..."></div>
                <div class="admin-input-group"><label>الخيار 1</label><input type="text" id="adminOpt0"></div>
                <div class="admin-input-group"><label>الخيار 2</label><input type="text" id="adminOpt1"></div>
                <div class="admin-input-group"><label>الخيار 3</label><input type="text" id="adminOpt2"></div>
                <div class="admin-input-group"><label>الخيار 4</label><input type="text" id="adminOpt3"></div>
                <div class="admin-input-group">
                    <label>رقم الإجابة الصحيحة</label>
                    <select id="adminCorrectSelect"><option value="0">الخيار 1</option><option value="1">الخيار 2</option><option value="2">الخيار 3</option><option value="3">الخيار 4</option></select>
                </div>
                <div class="admin-input-group">
                    <label>مستوى الصعوبة</label>
                    <select id="adminDifficultySelect"><option value="easy">سهل</option><option value="medium">متوسط</option><option value="hard">صعب</option></select>
                </div>
            </div>
            <button class="admin-btn-add" id="adminSubmitBtn" onclick="saveQuestion()">تأكيد وحقن السؤال ف السيرفر 🚀</button>
        </div>

        <!-- طاب الأسئلة -->
        <div class="admin-tab-content" id="questionsTab">
            <div id="questionsContainer" class="list-container"></div>
        </div>

        <!-- طاب اللاعبين والإحصائيات -->
        <div class="admin-tab-content" id="playersTab">
            <div class="admin-analytics-banner">
                <div class="analytics-card"><span>إجمالي اللاعبين</span><span id="totalPlayersCount" style="color:var(--primary);">0</span></div>
                <div class="analytics-card"><span>متصل الآن</span><span id="onlineCount" style="color:var(--success);">0</span></div>
                <div class="analytics-card"><span>غير متصل</span><span id="offlineCount" style="color:var(--text-muted);">0</span></div>
            </div>

            <button class="btn-reset-scores" onclick="resetAllPlayersPoints()">🔄 تصفير نقاط كل اللاعبين وبدء أسبوع جديد</button>
            
            <div id="playersContainer" class="list-container"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUpBGEhi8lGl0y2YKRI2hgST2AgmxdSCQ",
            authDomain: "aseila-cac39.firebaseapp.com",
            projectId: "aseila-cac39",
            storageBucket: "aseila-cac39.firebasestorage.app",
            messagingSenderId: "514903380801",
            appId: "1:514903380801:web:131ec2ab5ac87ade26c7c0",
            measurementId: "G-XSC7M9HJZ7",
            databaseURL: "https://aseila-cac39-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const ADMIN_USERNAME = "admin"; 
        const ADMIN_PASSWORD = "Dexter_Nacirox_2026"; 

        function loginAdminCustom() {
            const u = document.getElementById('adminUser').value.trim();
            const p = document.getElementById('adminPass').value;

            if (u === ADMIN_USERNAME && p === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_authenticated', 'true');
                document.getElementById('adminLoginPage').style.display = 'none';
                document.getElementById('adminPanelPage').style.display = 'block';
            } else {
                alert("⚠️ خطأ في معلومات الدخول!");
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('admin_authenticated') === 'true') {
                document.getElementById('adminLoginPage').style.display = 'none';
                document.getElementById('adminPanelPage').style.display = 'block';
            }
        };

        function switchTab(id, btn) { document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.admin-tab-btn').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); btn.classList.add('active'); }

        function saveQuestion() {
            const id = document.getElementById('editQuestionId').value;
            const data = { 
                q: document.getElementById('adminQuestionInput').value, 
                options: [
                    document.getElementById('adminOpt0').value, 
                    document.getElementById('adminOpt1').value, 
                    document.getElementById('adminOpt2').value, 
                    document.getElementById('adminOpt3').value
                ], 
                correct: parseInt(document.getElementById('adminCorrectSelect').value), 
                difficulty: document.getElementById('adminDifficultySelect').value 
            };
            
            if (id) {
                database.ref('questions/' + id).update(data).then(() => resetForm());
            } else {
                database.ref('questions').push(data).then(() => resetForm());
            }
        }

        function resetForm() { 
            alert("تم حفظ السؤال ف قاعدة البيانات بنجاح! 🎉"); 
            document.getElementById('editQuestionId').value=''; 
            document.getElementById('adminQuestionInput').value=''; 
            document.getElementById('adminOpt0').value=''; 
            document.getElementById('adminOpt1').value=''; 
            document.getElementById('adminOpt2').value=''; 
            document.getElementById('adminOpt3').value=''; 
        }

        function loadQuestions() {
            const container = document.getElementById('questionsContainer'); container.innerHTML = 'جاري التحميل...';
            database.ref('questions').once('value', (snap) => {
                container.innerHTML = ''; const data = snap.val(); if(!data) return;
                Object.keys(data).forEach(key => {
                    const div = document.createElement('div'); div.className = 'admin-list-item';
                    div.innerHTML = `<div class="item-meta-row"><span class="item-title">${data[key].q}</span><button class="action-control-btn" style="background: rgba(239, 68, 68, 0.1); color: var(--danger);" onclick="deleteQ('${key}')">حذف</button></div>`;
                    container.appendChild(div);
                });
            });
        }
        function deleteQ(key) { if(confirm("هل تريد حذف هذا السؤال؟")) database.ref('questions/' + key).remove().then(() => loadQuestions()); }

        function loadPlayers() {
            const container = document.getElementById('playersContainer'); container.innerHTML = 'جاري مزامنة بيانات اللاعبين...';
            database.ref('users').on('value', (snap) => {
                container.innerHTML = ''; const data = snap.val(); if(!data) {
                    document.getElementById('totalPlayersCount').innerText = 0;
                    document.getElementById('onlineCount').innerText = 0;
                    document.getElementById('offlineCount').innerText = 0;
                    return;
                }
                let on = 0; let off = 0; let total = 0;
                Object.keys(data).forEach(uid => {
                    total++;
                    if(data[uid].online === true) on++; else off++;
                    
                    const div = document.createElement('div'); div.className = 'admin-list-item';
                    const playerPoints = data[uid].points !== undefined ? data[uid].points : 0;
                    const statusText = data[uid].online === true ? '<span style="color:var(--success);">نشط 🟢</span>' : '<span style="color:var(--text-muted);">غير متصل ⚪</span>';
                    const banBadge = data[uid].banned === true ? '<span style="color:var(--danger); font-weight:700;">[محظور]</span>' : '';

                    div.innerHTML = `
                        <div class="item-meta-row">
                            <span class="item-title"><strong>${data[uid].name}</strong> ${banBadge}</span>
                            <span>السكور: <strong style="color:var(--primary);">${playerPoints}</strong></span>
                        </div>
                        <div style="margin-top:6px; font-size:12px; color: var(--text-muted);">الحالة: ${statusText}</div>
                        <div class="admin-actions-row-buttons">
                            ${data[uid].banned === true ? 
                                `<button class="action-control-btn btn-control-unban" onclick="setBanStatus('${uid}', false)">إلغاء الحظر</button>` : 
                                `<button class="action-control-btn btn-control-ban" onclick="setBanStatus('${uid}', true)">حظر الحساب</button>`
                            }
                            <button class="action-control-btn btn-control-delete" onclick="deletePlayerCompletely('${uid}')">حذف الحساب</button>
                        </div>`;
                    container.appendChild(div);
                });
                document.getElementById('totalPlayersCount').innerText = total; 
                document.getElementById('onlineCount').innerText = on; 
                document.getElementById('offlineCount').innerText = off;
            });
        }

        function setBanStatus(uid, status) { 
            const msg = status ? "هل تريد بالتأكيد حظر هذا الحساب؟" : "هل تريد إلغاء الحظر عن هذا اللاعب؟";
            if(confirm(msg)) {
                database.ref('users/' + uid + '/banned').set(status); 
            }
        }

        function deletePlayerCompletely(uid) {
            if(confirm("⚠️ تحذير نهائي: هل تريد حذف هذا الحساب تماماً من السيرفر؟")) {
                database.ref('users/' + uid).remove().then(() => {
                    alert("تم مسح الحساب بنجاح! 🗑️");
                }).catch((error) => {
                    alert("حدث خطأ: " + error.message);
                });
            }
        }

        function resetAllPlayersPoints() {
            if(confirm("⚠️ هل أنت متأكد من تصفير نقاط جَميع اللاعبين؟")) {
                database.ref('users').once('value', (snap) => {
                    const players = snap.val();
                    if(!players) { alert("لا يوجد لاعبين لتصفير نقاطهم!"); return; }
                    
                    let updates = {};
                    Object.keys(players).forEach(uid => {
                        updates[`users/${uid}/points`] = 0;
                    });
                    
                    database.ref().update(updates).then(() => {
                        alert("تم تصفير النقاط بنجاح! 🔄");
                    });
                });
            }
        }
    </script>
</body>
</html>
